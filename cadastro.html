<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>Cadastro</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <div class="logo">

        <h1>Albergue Santa Helena</h1>

    </div>

    <nav>

        <a href="index.html">Home</a>
        <a href="login.html">Login</a>

    </nav>

</header>

<div class="formulario">

    <h2>Cadastro</h2>

    <form id="formCadastro">

        <label>Nome</label>

        <input
        type="text"
        id="nome"
        required>

        <label>E-mail</label>

        <input
        type="email"
        id="email"
        required>

        <label>Senha</label>

        <input
        type="password"
        id="senha"
        required>

        <button type="submit">

            Cadastrar

        </button>

    </form>

    <p>

        Já possui cadastro?

        <a href="login.html">

            Faça Login

        </a>

    </p>

</div>

<script src="js/cadastro.js"></script>

</body>

</html>
